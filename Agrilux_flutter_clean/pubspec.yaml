name: agrilux
description: Agrilux — Agricultura Inteligente del Perú. App móvil con IA.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.1

  # Firebase
  firebase_core: ^2.27.0
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.9

  # Auth state
  provider: ^6.1.2
  shared_preferences: ^2.2.3

  # Imágenes
  image_picker: ^1.1.2
  image: ^4.1.7

  # Links / WhatsApp
  url_launcher: ^6.3.0

  # Íconos
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # Fuente Plus Jakarta Sans (igual que el original)
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: fonts/PlusJakartaSans-Regular.ttf
        - asset: fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800
    - family: Syne
      fonts:
        - asset: fonts/Syne-Bold.ttf
          weight: 700
        - asset: fonts/Syne-ExtraBold.ttf
          weight: 800
  # Si tienes bg.jpg agrégala aquí:
  # assets:
  #   - assets/bg.jpg

  